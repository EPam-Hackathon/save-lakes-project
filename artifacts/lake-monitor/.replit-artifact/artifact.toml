kind = "mobile"
previewPath = "/"
title = "Lake Monitoring System"
version = "1.0.0"
id = "artifacts/lake-monitor"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21839

[services.development]
run = "pnpm --filter @workspace/lake-monitor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lake-monitor", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/lake-monitor", "run", "serve" ]

[services.env]
PORT = "21839"
BASE_PATH = "/"
